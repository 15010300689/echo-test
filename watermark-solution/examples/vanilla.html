<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>水印方案 - Vanilla 示例</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; padding: 24px; }
    .card { padding: 16px; background: #f5f5f5; border-radius: 8px; max-width: 480px; }
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #eee; }
      .card { background: #222; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Vanilla 水印示例</h1>
    <p>切换系统深浅色模式，水印颜色会自动变化。</p>
    <p>打开 DevTools 尝试删除 <code>data-wm-root</code> 节点或改样式，水印会自动恢复。</p>
  </div>

  <!-- 先在 watermark-solution 目录执行 npm run build -->
  <script src="../dist/vanilla.iife.js"></script>
  <script>
    const wm = window.WatermarkSolution.createWatermark({
      text: ['内部资料', 'user@example.com', new Date().toLocaleString('zh-CN')],
      gap: [180, 140],
    });

    window.addEventListener('beforeunload', () => wm.destroy());
  </script>
</body>
</html>
