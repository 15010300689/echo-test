<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骨架屏方案</title>
    <style>
        *{
            margin:0;
            padding:0;
            position: relative;
        }
        html, body{
            width: 100%;
            height: 100%
        }

        .mubc-skeleton {
            width: 100%;
            height: 100%;
            color: transparent;
            background: linear-gradient(90deg, rgba(190, 190, 190, 0.2) 25%, rgba(129, 129, 129, .24) 37%, rgba(190, 190, 190, .2) 63%);
            background-size: 400% 100%;
            animation: skeleton-loading 1.4s ease infinite;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 100% 50%
            }

            to {
                background-position: 0 50%
            }
        }
    </style>
</head>
<body>
    <div class="mubc-skeleton"></div>
</body>
</html>
