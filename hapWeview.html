        <script>
            // if (!system) return;
            // 接收快应用发来的消息
            var recievedData = '';
            system.onmessage = function(data) {
                console.info("onmessage data="+data);
                var nData = JSON.parse(data);
                recievedData = nData;
            }
            document.addEventListener('DOMContentLoaded', function() {
                // DOM完全加载后执行的代码
                console.log('DOM is fully loaded and parsed', window.navigator.userAgent);
                if (window.navigator.userAgent.indexOf("hap") >= 0) {
                    console.log('在快应用环境中');
                    // execBusinessLogic(recievedData)
                    execBusinessLogic({});
                    handleGetMessage();
                }
            });
            function handleGetMessage() {
                let stopId = null;
                var btn = document.getElementById('btn');
                
                if (recievedData) {
                    clearTimeout(stopId);
                    console.log('result', JSON.parse(recievedData.message));
                    recievedData = JSON.parse(recievedData.message);
                    if (recievedData.ppu) {
                        btn.innerHTML = '已登录'
                    }
                    return;
                }
                stopId = setTimeout(function() {
                    this.handleGetMessage();
                }, 2000);

            }
            function execBusinessLogic(data) {
                //执行业务逻辑的代码
                console.log('execBusinessLogic', data);
                var btn = document.getElementById('btn');
                var ppu = getCookie('PPU') || '';
                var rpk_location = getCookie('rpk_location') || '{}';
                rpk_location = JSON.parse(rpk_location);
                console.log('rpk_location', rpk_location, rpk_location.lon, rpk_location.lat);
                console.log('ppu', ppu.length);
                ppu = ppu.trim()

                var city = getCookie('mcity') || '';
                console.log('city', city); // city为listname
                if (ppu.length != 0) {
                    btn.innerHTML = '已登录'
                }
                      

                // reload: current/target
                btn.onclick = function() {
                    if (ppu.length != 0) {
                        alert('已经登录过了，请勿重复登录');
                        return;
                    }
                    alert('去登录');
                    data = { 
                        action:'login', 
                        // autoReload: false
                        reloadPage: 'current' 
                    }
                    system.postMessage(JSON.stringify(data));
                }

                handleJump();

            }

            function getCookie(name) {
                const reg = new RegExp(`(^| )${name}=([^;]*)(;|$)`);
                const arr = document.cookie.match(reg);
                if (arr === null) return null;
                return unescape(arr[2]);
            }
