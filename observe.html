    <script>
        class Observe{
            constructor() {
                this.message = {};
            }

            on(id, fn) {
                if (!this.message[id]) {
                    this.message[id] = [fn];
                }
            }

            off(id, fn) {
                if (!this.message[id]) return;
                this.message[id] = this.message[id].filter((item) => item !== fn);
            }

            trigger(id, content) {
                if (!this.message[id]) return;
                this.message[id].forEach((fn) => fn(content));
            }
        }
        const observe = new Observe();
        // 获取联系人列表
        let contackList = [
            {
                name: '张三',
                id: 1,
                lastMsg: '你好',
                lastMsgTime: '2023-11-24',
                lastMsgId: 1,
                unReadCount: 2,

            {
                name: '李四',
                id: 2,
                lastMsg: '欢迎欢迎',
                lastMsgTime: '2023-11-25',
                lastMsgId: 5,
                unReadCount: 1,

        let currentId = 2;
        let currentMsgList = [
            {
                name: '李四',

                unReadCount: 0,

        // 订阅消息
        function sub() {
            contackList.forEach((item, index) => observe.on(item.id, (content) => {
                const {
                    msgList = [],
                } = content;
                let lastMsg = msgList.length > 0 ? msgList[msgList.length - 1] : {};
                if(!lastMsg) return;
                const { msgTime = '', text = '', msgId = '' } = lastMsg;
                if (item.lastMsgId == msgId) return;
                console.log('您有新消息，消息内容为：', text, msgList);
                console.log('=====================');
                // 未读消息数：
                let unReadCount = item.unReadCount;
                if (msgList.length > 0) {
                    unReadCount += msgList.length;
                }
                contackList[index] = {
                    ...item,
                    lastMsg: text || item.lastMsg,
                    msgTime,
                    unReadCount
                }

                if (item.id === currentId) {
                    let newContent = content;
                    newContent = {
                        ...content,
                        unReadCount: unReadCount || 0,
                        msgList: currentMsgList[0].msgList.concat(msgList)
                    };

                    currentMsgList = [newContent];
                }
            }));
            // 【异步】延迟去刷新联系人列表
            setTimeout(() => {
                console.log(contackList, '联系人列表更新');
                console.log(currentMsgList, '聊天面板更新');
            }, 500);
        }
